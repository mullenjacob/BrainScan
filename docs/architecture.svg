<svg width="680" height="666" viewBox="0 0 680 666" xmlns="http://www.w3.org/2000/svg" role="img">
<title>BrainScan project architecture</title>
<desc>Pipeline from training data through preprocessing, model training, the trained checkpoint, the inference app, to deployment on Jetson Orin Nano.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#444444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="0" y="0" width="680" height="666" fill="#ffffff"/>

<rect x="60" y="40" width="560" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="60" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#04342C">Training data</text>
<text x="340" y="78" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">MRI scans + FLAIR data</text>
<line x1="340" y1="96" x2="340" y2="146" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="60" y="146" width="560" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="166" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#04342C">Preprocessing</text>
<text x="340" y="184" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">Auto-crop, CLAHE, augmentation</text>
<line x1="340" y1="202" x2="340" y2="252" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="60" y="252" width="560" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="340" y="272" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#26215C">Model training</text>
<text x="340" y="290" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">Class-weighted transfer learning</text>
<line x1="340" y1="308" x2="340" y2="358" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="60" y="358" width="560" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="340" y="378" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#26215C">Trained checkpoint</text>
<text x="340" y="396" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="12" fill="#534AB7">best_model.pth</text>
<line x1="340" y1="414" x2="340" y2="464" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="60" y="464" width="560" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="340" y="484" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#4A1B0C">Inference app</text>
<text x="340" y="502" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D">Grad-CAM, confidence, OOD guard</text>
<line x1="340" y1="520" x2="340" y2="570" stroke="#444444" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="60" y="570" width="560" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="340" y="590" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="600" fill="#4A1B0C">Jetson Orin Nano</text>
<text x="340" y="608" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D">On-device deployment</text>
</svg>
